name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run test:unit
      - run: npm run test:integration
      - run: npm run test:alchemy-closure
      - run: npm run test:worldbook-v2
      - run: npm run test:strategy-sim-v2
      - run: npm run test:worldbook-v2-product
      - run: npm run test:strategy-sim-v2-product
      - run: npm run test:v2-product-playable
      - run: npm run test:llm-prompts
      - run: npm run audit:architecture-debt
      - run: npm run audit:v2-product-playable
      - run: npm run test:world-tree-v2-entries
      - run: npm run test:project-complete-audit
      - run: npm run truth:check
      - run: npm run audit
      - run: npm run interface-audit

  browser-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run smoke:product-entry-browser-matrix
      - run: npm run smoke:experience-golden-path
      - run: npm run smoke:v0.5-interaction-regressions
      - run: npm run qa:visual-shell

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run verify:coverage
