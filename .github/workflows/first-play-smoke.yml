name: First Play Real LLM Smoke

on:
  workflow_dispatch:
    inputs:
      example_id:
        description: "Example id to run"
        required: false
        default: "demo-world-cloud-steam-city"
  schedule:
    - cron: "17 19 * * *"

jobs:
  smoke-first-play:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - provider: openai-compatible
            base_url_secret: WT_SMOKE_BASE_URL
            model_secret: WT_SMOKE_MODEL
            key_secret: WT_SMOKE_KEY
          - provider: deepseek
            base_url_secret: WT_SMOKE_DEEPSEEK_BASE_URL
            model_secret: WT_SMOKE_DEEPSEEK_MODEL
            key_secret: WT_SMOKE_DEEPSEEK_KEY
          - provider: openrouter
            base_url_secret: WT_SMOKE_OPENROUTER_BASE_URL
            model_secret: WT_SMOKE_OPENROUTER_MODEL
            key_secret: WT_SMOKE_OPENROUTER_KEY
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - name: Run first play smoke
        env:
          WT_SMOKE_EXAMPLE_ID: ${{ inputs.example_id || 'demo-world-cloud-steam-city' }}
          WT_SMOKE_PROVIDER_ID: ${{ matrix.provider }}
          WT_SMOKE_BASE_URL: ${{ secrets[matrix.base_url_secret] }}
          WT_SMOKE_MODEL: ${{ secrets[matrix.model_secret] }}
          WT_SMOKE_KEY: ${{ secrets[matrix.key_secret] }}
        run: npm run smoke:first-play
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: first-play-smoke-report-${{ matrix.provider }}
          path: |
            docs/reports/first-play-smoke-latest.md
            docs/reports/first-play-smoke-latest.json
