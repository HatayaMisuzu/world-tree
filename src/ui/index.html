<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>World Tree Terminal</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app" class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">WT</div>
        <div>
          <h1>World Tree</h1>
          <p>Interactive fiction desk</p>
        </div>
      </div>

      <div class="root-box">
        <span>Library</span>
        <strong id="rootPath">Not loaded</strong>
      </div>

      <div id="moduleList" class="module-list"></div>
    </aside>

    <section class="workspace">
      <header class="toolbar">
        <div>
          <h2 id="pageTitle">World Tree</h2>
          <p id="pageSub">Choose a world, then begin.</p>
        </div>
        <div class="toolbar-actions">
          <select id="languageSelect" class="language-select" aria-label="Language">
            <option value="zh-CN">中文</option>
            <option value="en-US">English</option>
          </select>
          <button id="openRootBtn" class="primary">Open World</button>
          <button id="refreshBtn">Refresh</button>
          <button id="healthBtn">Check</button>
          <button id="exportBtn">Export</button>
          <button id="openConsoleBtn" class="ghost" title="打开观测终端 v2">🌳 终端</button>
        </div>
      </header>

      <nav id="tabs" class="tabs"></nav>
      <main id="main" class="main"></main>

      <footer class="status">
        <span id="statusLeft">Ready</span>
        <span id="statusRight">read only</span>
      </footer>
    </section>
  </div>

  <script type="module" src="./renderer.js"></script>
</body>
</html>
