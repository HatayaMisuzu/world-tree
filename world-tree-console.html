<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>World Tree · 生长中的世界档案</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="world-tree-console.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">WT</div>
        <div>
          <h1>World Tree</h1>
          <p class="brand-tagline">生长中的世界档案</p>
          <p id="appVersion" class="brand-version">vunknown</p>
        </div>
      </div>
      <nav id="primaryNav" class="primary-nav" aria-label="主导航"></nav>
      <div class="sidebar-card">
        <span class="label">当前世界</span>
        <strong id="sideWorldName">未选择</strong>
        <span id="sideWorldMeta">等待加载</span>
        <span class="sidebar-divider" aria-hidden="true"></span>
        <span class="label">模型服务</span>
        <span id="sideModelMeta">未配置</span>
      </div>
    </aside>

    <section class="app-main">
      <header class="topbar">
        <div>
          <h2 id="viewTitle">首页</h2>
          <p id="contextLine">启动中...</p>
        </div>
        <div class="toolbar">
          <span id="llmStatus" class="badge pending">未连接</span>
          <span id="saveStatus" class="badge pending" aria-live="polite">本地就绪</span>
          <button id="refreshBtn" class="ghost">刷新</button>
          <button id="settingsBtn" class="ghost">设置</button>
        </div>
      </header>

      <main id="main" class="main-content"></main>

      <nav id="mobileNav" class="mobile-nav" aria-label="移动端导航"></nav>
    </section>
  </div>

  <button id="debugToggle" class="debug-toggle" title="Ctrl+Shift+D 切换调试日志">Debug</button>
  <div id="debugPanel" class="debug-panel">
    <div class="debug-head">
      <strong>引擎调试日志</strong>
      <span>Ctrl+Shift+D</span>
      <button class="small" data-action="refresh-debug">刷新</button>
    </div>
    <div id="debugLogContent"></div>
  </div>

  <div id="toastHost" class="toast-host" role="status" aria-live="polite" aria-atomic="true"></div>
  <script src="world-tree-client-core.js"></script>
  <script src="ui-labels.js"></script>
  <script src="browser/app/product-registry.js"></script>
  <script src="browser/app/navigation.js"></script>
  <script src="browser/state/app-store.js"></script>
  <script src="browser/components/feedback.js"></script>
  <script src="browser/components/forms.js"></script>
  <script src="browser/components/product-components.js"></script>
  <script src="browser/views/core-views.js"></script>
  <script src="browser/views/creation-settings-views.js"></script>
  <script src="browser/views/product-ia-views.js"></script>
  <script src="browser/controllers/navigation-controller.js"></script>
  <script src="browser/controllers/entry-controller.js"></script>
  <script src="browser/controllers/play-controller.js"></script>
  <script src="browser/controllers/content-controller.js"></script>
  <script src="browser/controllers/settings-controller.js"></script>
  <script src="browser/controllers/character-v2-controller.js"></script>
  <script src="world-tree-console.js"></script>
</body>
</html>
