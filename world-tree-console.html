<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>World Tree 观测终端 v2</title>
<style>
:root {
  --bg:#0b0f16; --panel:#121820; --panel-2:#17202b; --line:#263040; --line-soft:#1d2838;
  --text:#cdd7e6; --muted:#7a889b; --accent:#5b9cf5; --accent-2:#a8caff;
  --ok:#3ecf8e; --warn:#e8b339; --bad:#e54d4d; --purple:#b388ff; --cyan:#5cd4ff;
  --shadow:0 24px 60px rgba(0,0,0,.4); --radius:10px; --gap:14px;
  --font:"Microsoft YaHei UI","PingFang SC","Noto Sans SC",system-ui,sans-serif;
  --mono:"Cascadia Mono","JetBrains Mono","Consolas",monospace;
}
*{box-sizing:border-box}html,body{min-height:100%}
body{margin:0;background:var(--bg);color:var(--text);font:14px/1.6 var(--font);min-width:960px}
button,input,select,textarea{font:inherit;color:inherit}
button{border:1px solid var(--line);background:#1a2436;border-radius:8px;min-height:36px;padding:6px 14px;cursor:pointer;transition:border-color .15s,background .15s}
button:hover{border-color:var(--accent);background:#1f2b40}
button.primary{background:#1a5bc4;border-color:#1a5bc4;color:#fff}
button.primary:hover{background:#2168db}
button.ghost{background:transparent;border-color:transparent}
button.danger{border-color:rgba(229,77,77,.45);color:#ff9e9e}
button.small{min-height:28px;padding:3px 9px;font-size:12px}
button:disabled{opacity:.4;cursor:not-allowed}
input,select,textarea{background:#0d141f;border:1px solid var(--line);border-radius:8px;padding:7px 11px;min-height:36px;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(91,156,245,.15)}
select{cursor:pointer}
textarea{resize:vertical;font-family:var(--mono);font-size:13px}

.app{display:grid;grid-template-rows:auto auto 1fr auto;min-height:100vh}
.topbar{position:sticky;top:0;z-index:20;display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;padding:12px 20px;background:rgba(11,15,22,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(10px)}
.brand{display:flex;align-items:baseline;gap:14px;min-width:0}
.brand h1{margin:0;font-size:18px;font-weight:700;letter-spacing:.5px}
.brand .context{min-width:0;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px}
.toolbar{display:flex;gap:8px;align-items:center;white-space:nowrap;flex-wrap:wrap;justify-content:flex-end}

.tabs{display:flex;gap:2px;padding:0 20px;border-bottom:1px solid var(--line);background:#0d141f;overflow-x:auto}
.tab{border:0;border-bottom:2px solid transparent;border-radius:0;background:transparent;min-height:40px;padding:7px 13px;color:var(--muted);white-space:nowrap;font-size:13px}
.tab.active{color:var(--accent-2);border-bottom-color:var(--accent);background:rgba(91,156,245,.07)}
.tab:hover{color:var(--text);background:rgba(255,255,255,.03)}

main{padding:20px;max-width:1500px;width:100%;margin:0 auto}
.statusbar{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:7px 20px;border-top:1px solid var(--line);color:var(--muted);background:#0d141f;font-size:12px}

.grid{display:grid;gap:var(--gap)}
.cols-2{grid-template-columns:repeat(2,1fr)}.cols-3{grid-template-columns:repeat(3,1fr)}.cols-4{grid-template-columns:repeat(4,1fr)}
.cols-auto{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;min-width:0}
.panel.tight{padding:10px}
.panel h2{margin:0 0 10px;font-size:16px;letter-spacing:.3px}
.panel h3{margin:0 0 8px;font-size:14px}
.panel .sub{color:var(--muted);margin:-6px 0 12px;font-size:13px}
.panel-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}

.stat{display:grid;gap:3px;background:var(--panel-2);border:1px solid var(--line-soft);border-radius:var(--radius);padding:12px;min-height:72px}
.stat strong{font-size:24px;line-height:1.1}
.stat span{color:var(--muted);font-size:12px}

.list{display:grid;gap:8px}
.item{display:grid;gap:6px;padding:10px 12px;background:#0d141f;border:1px solid var(--line-soft);border-radius:var(--radius);min-width:0}
.item-head{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start}
.item-title{font-weight:600;overflow-wrap:anywhere;font-size:14px}

.badge{display:inline-flex;align-items:center;min-height:22px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);background:#0f1a2a;color:var(--muted);font-size:11px;white-space:nowrap;letter-spacing:.3px}
.badge.ok{color:#b8f0d0;border-color:rgba(62,207,142,.4)}
.badge.warn{color:#ffdba6;border-color:rgba(232,179,57,.45)}
.badge.bad{color:#ffadad;border-color:rgba(229,77,77,.5)}
.badge.info{color:#b9dcff;border-color:rgba(91,156,245,.45)}
.badge.purple{color:#e0ccff;border-color:rgba(179,136,255,.4)}
.badge.cyan{color:#bff0ff;border-color:rgba(92,212,255,.4)}

.empty,.notice{border:1px dashed var(--line);border-radius:var(--radius);padding:14px;color:var(--muted);background:#0d141f;font-size:13px}
.notice.warn{border-color:rgba(232,179,57,.35);color:#ffdba6}
.notice.bad{border-color:rgba(229,77,77,.4);color:#ffadad}
.notice.ok{border-color:rgba(62,207,142,.35);color:#b8f0d0}

table{width:100%;border-collapse:collapse;border-radius:var(--radius);border:1px solid var(--line);overflow:hidden}
th,td{border-bottom:1px solid var(--line-soft);padding:7px 10px;text-align:left;vertical-align:top;overflow-wrap:anywhere;font-size:13px}
th{color:var(--muted);font-weight:600;font-size:12px;background:#0d141f}
tr:last-child td{border-bottom:0}

pre,code{font-family:var(--mono);letter-spacing:0}
code{background:#0d141f;border:1px solid var(--line-soft);border-radius:4px;padding:1px 5px;font-size:12px}
pre{margin:0;white-space:pre-wrap;overflow-wrap:anywhere;max-height:400px;overflow:auto;background:#0d141f;border:1px solid var(--line-soft);border-radius:var(--radius);padding:10px;color:#c9d1d9;font-size:12px;tab-size:2}

details{border:1px solid var(--line-soft);border-radius:var(--radius);padding:8px 10px;background:#0d141f;font-size:13px}
details+details{margin-top:6px}
summary{cursor:pointer;font-weight:600}
details>*:not(summary){margin-top:8px}

.actions{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.filters{display:grid;grid-template-columns:1fr auto auto;gap:8px;margin-bottom:12px}
.diff{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.diff .changed{border-color:rgba(232,179,57,.4)}
.diff-row{display:grid;grid-template-columns:minmax(100px,.6fr) 1fr;gap:8px;padding:6px 0;border-bottom:1px solid var(--line-soft)}
.diff-row:last-child{border-bottom:0}
.path{color:var(--accent-2);font-family:var(--mono);font-size:12px;overflow-wrap:anywhere;word-break:break-all}

canvas.graph{display:block;width:100%;height:380px;border:1px solid var(--line-soft);background:#0d141f;border-radius:var(--radius)}

.chat-layout{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:14px;min-height:calc(100vh - 160px)}
.chat-space{display:grid;grid-template-rows:auto 1fr auto;gap:10px;min-height:580px}
.chat-messages{display:grid;align-content:start;gap:8px;min-height:380px;max-height:calc(100vh - 300px);overflow:auto;padding:10px;background:#0d141f;border:1px solid var(--line-soft);border-radius:var(--radius)}
.chat-message{display:grid;gap:5px;max-width:84%;padding:9px 12px;border-radius:var(--radius);border:1px solid var(--line-soft);background:#141e2c;overflow-wrap:anywhere;font-size:13px}
.chat-message.user{justify-self:end;background:#14345a;border-color:rgba(91,156,245,.4)}
.chat-message.assistant{justify-self:start}
.chat-message.system,.chat-message.error{justify-self:center;max-width:100%;color:#ffdba6;background:#1f1a0d;border-color:rgba(232,179,57,.4)}
.chat-message.error{color:#ffadad;background:#1f1212;border-color:rgba(229,77,77,.45)}
.chat-meta-line{display:flex;gap:8px;align-items:center;color:var(--muted);font-size:11px}
.chat-content{white-space:pre-wrap;line-height:1.7}
.wt-tag{display:inline-block;padding:1px 6px;margin:0 2px;border-radius:4px;background:rgba(91,156,245,.12);color:#b9dcff;font-family:var(--mono);font-size:11px}
.chat-input-row{display:grid;grid-template-columns:1fr auto;gap:8px}
.chat-input-row textarea{min-height:80px;border:1px solid var(--line);border-radius:var(--radius);padding:10px;background:#0d141f;color:var(--text);font-family:var(--font);font-size:13px}
.chat-side{display:grid;align-content:start;gap:10px}
.chat-settings{display:grid;gap:6px}
.clip-list{max-height:160px;overflow:auto}

.pulse-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.pulse-card{background:var(--panel-2);border:1px solid var(--line-soft);border-radius:var(--radius);padding:10px;display:grid;gap:4px}
.pulse-card b{font-size:22px}
.pulse-card.normal b{color:var(--ok)}.pulse-card.warning b{color:var(--warn)}.pulse-card.critical b{color:var(--bad)}
.pulse-card i{display:block;height:3px;border-radius:2px;background:var(--line);position:relative}
.pulse-card i::after{content:'';position:absolute;left:0;top:0;height:100%;width:var(--value,50%);border-radius:2px;background:var(--accent);transition:width .5s}

.hidden{display:none!important}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.loading{animation:pulse 1.2s ease-in-out infinite}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <h1>🌳 观测终端 v2</h1>
      <div id="contextLine" class="context">← 拖拽项目文件夹或点击选择目录</div>
    </div>
    <div class="toolbar">
      <button id="pickDirBtn" class="primary" title="选择 world-tree-desktop 项目目录">📂 选择目录</button>
      <button id="dragBtn" class="ghost" title="拖拽文件夹到页面">📎 拖拽</button>
      <button id="refreshBtn" class="ghost" disabled>🔄 刷新</button>
    </div>
  </header>
  <nav id="tabs" class="tabs"></nav>
  <main id="main"></main>
  <footer class="statusbar">
    <div id="statusLeft">只读 · 浏览器/Electron · 控制台 v2.1</div>
    <div id="statusRight">待加载</div>
  </footer>
</div>
<input id="dirInput" class="hidden" type="file" webkitdirectory multiple accept=".json,.jsonl,.html,.js,.cjs,.mjs,.ts,.tsx,.css,.md,.txt,.yaml,.yml">

<script>
"use strict";
/* ═══════════════════════════════════════════════════════════════
 * World Tree 观测终端 v2  —  翻新版
 * 适配 world-tree-desktop v1.0.1 项目结构（project-relative paths）
 * 浏览器拖拽加载 / Electron IPC 双模式
 * ═══════════════════════════════════════════════════════════════ */

const CFG = {
  version:"2.1.0",
  productVersion:"1.0.1",
  gatewayCandidates:["http://127.0.0.1:18742","http://127.0.0.1:8742","http://127.0.0.1:8642"],
  systemDirs:new Set(["_engine","_learned","_material_warehouse","_processing","_references","_temp","_console","node_modules",".next","dist","out","win-unpacked"]),
  tabs:[
    {id:"overview",label:"📊 概览",prio:0},
    {id:"chat",label:"💬 对话",prio:5},
    {id:"worlds",label:"🌍 世界",prio:8},
    {id:"archives",label:"📦 存档",prio:10},
    {id:"modules",label:"📁 模组",prio:12},
    {id:"characters",label:"👤 角色",prio:20},
    {id:"scenes",label:"🎭 场景",prio:30},
    {id:"state",label:"📈 状态",prio:40},
    {id:"telemetry",label:"📡 脉象",prio:44},
    {id:"director",label:"🎬 导演模式",prio:45},
    {id:"content",label:"📦 内容库",prio:46},
    {id:"proposals",label:"📋 提案",prio:47},
    {id:"causality",label:"🔗 因果链",prio:48},
    {id:"memory",label:"🧠 记忆层",prio:49},
    {id:"guardian",label:"🛡 守护",prio:50},
    {id:"tracking",label:"🎯 追踪",prio:55},
    {id:"branches",label:"🌿 分支",prio:60},
    {id:"organizations",label:"🏛 组织",prio:65},
    {id:"presets",label:"⚙ 预设",prio:68},
    {id:"commands",label:"⌨ 指令",prio:70},
    {id:"health",label:"🔍 体检",prio:75},
  ]
};

/* ── 工具 ── */
const U = {
  qs(s,r){return (r||document).querySelector(s)},
  qsa(s,r){return Array.from((r||document).querySelectorAll(s))},
  esc(v){return String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")},
  path(...p){return p.filter(Boolean).join("/").replace(/\\/g,"/").replace(/\/+/g,"/").replace(/^\/|\/$/g,"")},
  base(p){return String(p||"").split(/[\\/]/).pop()||p},
  ext(s){return String(s||"").replace(/^.*\./,"")},
  norm(p){return String(p||"").replace(/\\/g,"/").replace(/^\/+/,"").toLowerCase()},
  flat(v){if(!v)return[];if(Array.isArray(v))return v;if(typeof v==="object")return Object.entries(v).map(([k,it])=>(it&&typeof it==="object"&&!Array.isArray(it)?{id:k,...it}:{id:k,value:it}));return[v]},
  get(o,p,f){const k=String(p).split(".");let c=o;for(const kk of k){if(c==null||typeof c!=="object"||!(kk in c))return f;c=c[kk]}return c??f},
  first(o,ps,f=""){for(const p of ps){const v=U.get(o,p);if(v!==undefined&&v!==null&&v!=="")return v}return f},
  date(v){if(!v)return"未知";const d=v instanceof Date?v:new Date(v);if(isNaN(d.getTime()))return String(v);return d.toLocaleString("zh-CN",{hour12:false})},
  rel(v){if(!v)return"未知";const d=v instanceof Date?v:new Date(v);if(isNaN(d.getTime()))return String(v);const diff=Date.now()-d.getTime(),a=Math.abs(diff);if(a<6e4)return"刚刚";if(a<36e5)return Math.round(a/6e4)+" 分钟前";if(a<864e5)return Math.round(a/36e5)+" 小时前";return Math.round(a/864e5)+" 天前"},
  json(v){try{return JSON.stringify(v??null,null,2)}catch{return String(v)}},
  compact(v,m=180){const t=typeof v==="string"?v:U.json(v);const c=t.replace(/\s+/g," ").trim();return c.length>m?c.slice(0,m)+"...":c},
  slug(v,f="item"){return String(v||"").trim().replace(/[^\p{L}\p{N}._-]+/gu,"_").replace(/^_+|_+$/g,"").slice(0,48)||f},
  hash(v){let h=2166136261;for(let i=0;i<v.length;i++){h^=v.charCodeAt(i);h=Math.imul(h,16777619)}return(h>>>0).toString(16).padStart(8,"0")},
  async readTxt(f){return new Promise((rs,rj)=>{const r=new FileReader();r.onload=()=>rs(String(r.result||""));r.onerror=()=>rj(r.error);r.readAsText(f,"utf-8")})},
  parseJ(t,p,w){try{return JSON.parse(t)}catch(e){w.push({level:"error",path:p,message:"JSON 解析失败: "+e.message});return null}},
  fileUrl(p){try{return new URL(p,document.URL).href}catch{return p}},
  isElectron(){return typeof window!=="undefined"&&(!!window.process?.versions?.electron||!!navigator.userAgent.includes("Electron"))},
  async copy(t){if(navigator.clipboard?.writeText){await navigator.clipboard.writeText(t);return}const a=document.createElement("textarea");a.value=t;a.style.position="fixed";a.style.left="-1000px";document.body.appendChild(a);a.focus();a.select();const ok=document.execCommand("copy");a.remove();return ok},
  downloadJson(fn,data){const b=new Blob([U.json(data)],{type:"application/json;charset=utf-8"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=fn;a.click();setTimeout(()=>URL.revokeObjectURL(u),1e3)},
  diff(l,r,pre=""){
    const rows=[];const lo=l&&typeof l==="object",ro=r&&typeof r==="object";
    if(!lo||!ro||Array.isArray(l)||Array.isArray(r)){if(U.json(l)!==U.json(r))rows.push({path:pre||"$",left:l,right:r});return rows}
    const ks=new Set([...Object.keys(l||{}),...Object.keys(r||{})]);
    for(const k of[...ks].sort()){rows.push(...U.diff(l?.[k],r?.[k],pre?`${pre}.${k}`:k));if(rows.length>120)break}
    return rows
  }
};

/* ── 组件 ── */
const C = {
  badge(t,k="pending"){return`<span class="badge ${k}">${U.esc(t)}</span>`},
  empty(t,d=""){return`<div class="empty"><strong>${U.esc(t)}</strong>${d?`<div>${U.esc(d)}</div>`:""}</div>`},
  notice(t,k=""){return`<div class="notice ${k}">${U.esc(t)}</div>`},
  stat(l,v,d=""){return`<div class="stat"><strong>${U.esc(v)}</strong><span>${U.esc(l)}</span>${d?`<span>${U.esc(d)}</span>`:""}</div>`},
  json(v){return`<pre>${U.esc(U.json(v))}</pre>`},
  table(rows,cols){if(!rows.length)return C.empty("无数据");return`<table><thead><tr>${cols.map(c=>`<th>${U.esc(c.l)}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${c.render?c.render(r):U.esc(U.get(r,c.k,""))}</td>`).join("")}</tr>`).join("")}</tbody></table>`},
  itemList(items){const a=U.flat(items);if(!a.length)return C.empty("无条目");return`<div class="list">${a.map((it,i)=>{const t=U.first(it,["title","name","id","key"],"条目 "+(i+1));return`<details><summary>${U.esc(t)}</summary>${C.json(it)}</details>`}).join("")}</div>`},
  warns(ws){if(!ws?.length)return"";const items=ws.slice(0,10).map(w=>`<div class="notice ${w.level==="error"?"bad":"warn"}"><strong>${U.esc(w.path||"数据")}</strong> · ${U.esc(w.message)}</div>`).join("");const more=ws.length>10?C.notice(`还有 ${ws.length-10} 条隐藏`,"warn"):"";return`<div class="grid">${items}${more}</div>`},
  diffRows(lt,rt,rows){if(!rows.length)return C.notice("无差异","ok");return`<div class="panel changed"><h3>差异: ${U.esc(lt)} ↔ ${U.esc(rt)}</h3><div class="list">${rows.map(r=>`<div class="diff-row"><div class="path">${U.esc(r.path)}</div><div class="diff"><pre>${U.esc(U.json(r.left))}</pre><pre>${U.esc(U.json(r.right))}</pre></div></div>`).join("")}</div></div>`},
  chatContent(t){const e=U.esc(t||"");return e.replace(/\[世界树:([^\]]+)\]/g,'<span class="wt-tag">[世界树:$1]</span>').replace(/\[\/世界树\]/g,'<span class="wt-tag">[/世界树]</span>')},
  chatMsg(m){const rl=m.role==="user"?"玩家":m.role==="assistant"?"DM":"系统";const cb=m.role==="assistant"?`<button class="small" data-chat-clip="${U.esc(m.id)}">📋</button>`:"";return`<div class="chat-message ${U.esc(m.role)}"><div class="chat-meta-line"><strong>${U.esc(rl)}</strong><span>${U.date(m.ts)}</span><span class="actions">${cb}</span></div><div class="chat-content">${C.chatContent(m.content)}</div></div>`},
  pulseCard(item){return`<div class="pulse-card ${U.esc(item.st||"normal")}"><div><strong>${U.esc(item.n||item.id)}</strong><span>${U.esc(item.st||"normal")}</span></div><b>${item.v??0}</b><i style="--value:${Math.max(0,Math.min(100,Number(item.v)||0))}%"></i></div>`}
};

/* ── 应用状态 ── */
const AS = {
  activeTab:"overview",activeModule:"",sourceLabel:"未加载",files:new Map(),jsonCache:new Map(),
  warnings:[],model:null,moduleData:null,tree:null
};

/* ── 数据加载 ── */
const DS = {
  async loadFromDir(files,label){
    AS.files=new Map();AS.jsonCache=new Map();AS.warnings=[];
    for(const f of Array.from(files||[])){
      const p=f.webkitRelativePath||f.name;
      AS.files.set(U.norm(p),{path:p,file:f,lastModified:f.lastModified});
    }
    AS.sourceLabel=label||"已加载";
    return DS.buildModel();
  },
  async loadFromRecords(records,label){
    AS.files=new Map();AS.jsonCache=new Map();AS.warnings=[];
    for(const r of Array.from(records||[])){
      if(!r?.path)continue;
      AS.files.set(U.norm(r.path),{path:r.path,text:r.text||"",size:r.size||0,mtimeMs:r.mtimeMs||0});
    }
    AS.sourceLabel=label||"Electron IPC";
    return DS.buildModel();
  },
  async readText(path){
    const k=U.norm(path);const rec=AS.files.get(k);if(!rec)return null;
    if(rec.file)return U.readTxt(rec.file);
    if(typeof rec.text==="string")return rec.text;
    return null;
  },
  async readJson(path,req){
    const k=U.norm(path);if(AS.jsonCache.has(k))return AS.jsonCache.get(k);
    if(!AS.files.has(k)){if(req)AS.warnings.push({level:"warn",path,message:"未找到文件"});return null}
    const txt=await DS.readText(path);const j=U.parseJ(txt,path,AS.warnings);
    AS.jsonCache.set(k,j);return j;
  },
  has(p){return AS.files.has(U.norm(p))},
  list(prefix=""){
    const n=U.norm(prefix);
    return Array.from(AS.files.values()).filter(r=>r?.path&&(!n||U.norm(r.path).startsWith(n))).map(r=>r.path).sort((a,b)=>a.localeCompare(b,"zh-CN"));
  },
  async firstJson(paths){
    for(const p of paths){if(DS.has(p))return{p,data:await DS.readJson(p)}}return{path:paths[0],data:null};
  },
  topDirs(){
    const dirs=new Set();
    for(const r of AS.files.values()){
      const first=String(r.path||"").replace(/\\/g,"/").split("/")[0];
      if(first&&!first.includes(".")&&!CFG.systemDirs.has(first))dirs.add(first);
    }
    return[...dirs].sort((a,b)=>a.localeCompare(b,"zh-CN"));
  },
  /* 加载项目模块数据 */
  async buildModel(){
    if(!AS.files.size)return{loaded:false,modules:[],activeModule:null,warnings:[],sourceLabel:AS.sourceLabel};
    const model={loaded:true,modules:[],activeModule:null,warnings:AS.warnings,sourceLabel:AS.sourceLabel,files:DS.list()};
    const pkg=await DS.readJson("package.json");const readme=await DS.readText("README.md");
    const appManifest=await DS.readJson("app-manifest.json");
    const srcFiles=DS.list("src/");const v0OutFiles=DS.list("src/v0-out/");const legacyUiFiles=DS.list("src/ui/");const coreFiles=DS.list("src/core/");
    const dataFiles=DS.list("data/");const worldFiles=DS.list("data/engine/worlds/");const runFiles=DS.list("data/engine/runs/");const v0uiFiles=DS.list("v0-ui/");
    model.pkg=pkg;model.readmeLine=readme?readme.split("\n")[0]||"":"";model.appManifest=appManifest;
    model.srcFiles=srcFiles.length;model.v0OutFiles=v0OutFiles.length;model.legacyUiFiles=legacyUiFiles.length;model.uiFiles=v0OutFiles.length||legacyUiFiles.length;model.coreFiles=coreFiles.length;
    model.dataFiles=dataFiles.length;model.worldFiles=worldFiles.length;model.runFiles=runFiles.length;model.v0uiFiles=v0uiFiles.length;

    // 加载世界数据
    model.worlds=[];model.archiveGroups=[];
    const desktopWorldDirs=new Set();
    for(const f of worldFiles){
      const m=U.norm(f).match(/^data\/engine\/worlds\/([^/]+)\/world\.json$/);
      if(m)desktopWorldDirs.add(m[1]);
    }
    for(const dir of [...desktopWorldDirs].sort((a,b)=>a.localeCompare(b,"zh-CN"))){
      const base=U.path("data/engine/worlds",dir);
      const wj=await DS.readJson(U.path(base,"world.json"));
      const rt=await DS.readJson(U.path(base,"runtime.json"));
      if(!wj)continue;
      model.worlds.push({
        name:dir,
        title:U.first(wj,["title","displayName","name","id"],dir),
        worldType:U.first(wj,["worldType","world_type","mode","type"],"-"),
        branch:U.first(rt||{},["activeBranch","branch"],"main"),
        path:base,
        turnCount:U.first(rt||{},["turnCount","turn","session.turn"],0),
        lastPlayedAt:U.first(rt||{},["updatedAt","lastPlayedAt","mtime"],""),
        kind:"desktop-world"
      });
    }
    const legacyWorlds=DS.topDirs().filter(d=>d!="data"&&d!="src"&&d!="v0-ui"&&d!="defaults"&&d!="scripts"&&d!="design"&&d!="docs"&&d!="personas"&&d!="paths"&&d!="node_modules");
    for(const w of legacyWorlds){
      const wj=await DS.readJson(U.path(w,"module.json"));if(!wj)continue;
      const tj=await DS.readJson(U.path(w,"timeline-tree.json"));
      const branch=U.first(tj||{},["active_branch","activeBranch"],"main");
      model.worlds.push({name:w,title:U.first(wj,["name","title"],w),worldType:U.first(wj,["world_type","type"],"")||"-",branch,path:w,kind:"legacy-module"});
    }

    // 加载引擎配置
    const ec=await DS.readJson("data/engine/");
    model.engineConfig=ec;
    
    // 读取项目关键文件统计
    model.defaults={};
    const dFiles=DS.list("defaults/");
    model.defaults.files=dFiles;
    const scriptFiles=DS.list("scripts/");
    model.scriptFiles=scriptFiles;
    
    AS.model=model;
    return model;
  }
};

const CH = {
  settingsKey:"wt2-chat-settings",clipKey:"wt2-chat-clips",currentKey:"",messages:[],settings:null,status:"未连接",busy:false,draft:"",apiProcessed:false,
  defaultS(){return{baseUrl:"http://127.0.0.1:18742",token:"",sessionId:"",sessionsByModule:{},sessionsMetaByModule:{},showBoundary:true,autoConnect:true}},
  loadS(){if(CH.settings)return CH.settings;try{CH.settings={...CH.defaultS(),...JSON.parse(localStorage.getItem(CH.settingsKey)||"{}")}}catch{CH.settings=CH.defaultS()}return CH.settings},
  saveS(s){CH.settings={...CH.defaultS(),...s};CH.settings.sessionsByModule=CH.settings.sessionsByModule||{};CH.settings.sessionsMetaByModule=CH.settings.sessionsMetaByModule||{};localStorage.setItem(CH.settingsKey,JSON.stringify(CH.settings))},
  moduleKey(m){const w=m?.worlds?.[0];const raw=w?.title||w?.name||AS.sourceLabel||"global";return U.slug(raw,"global")+"__"+U.hash(raw)},
  historyKey(m){return"wt2-chat-"+CH.moduleKey(m)},
  sessionFor(m){const s=CH.loadS();return s.sessionsByModule?.[CH.moduleKey(m)]||""},
  sessionsMetaFor(m){const s=CH.loadS();return U.flat(s.sessionsMetaByModule?.[CH.moduleKey(m)]||[]).filter(i=>i&&i.id).sort((a,b)=>String(b.updatedAt||b.createdAt||"").localeCompare(String(a.updatedAt||a.createdAt||"")))},
  ensureLoaded(m){const k=CH.historyKey(m);if(k===CH.currentKey)return;CH.currentKey=k;try{CH.messages=JSON.parse(localStorage.getItem(k)||"[]")}catch{CH.messages=[]}},
  persist(){if(!CH.currentKey)return;localStorage.setItem(CH.currentKey,JSON.stringify(CH.messages.slice(-200)))},
  add(role,content,ext){const msg={id:"m_"+Date.now()+"_"+Math.random().toString(16).slice(2),role,content,ts:new Date().toISOString(),...ext};CH.messages.push(msg);CH.persist();return msg},
  clear(){CH.messages=[];CH.persist()},
  clips(){try{return JSON.parse(localStorage.getItem(CH.clipKey)||"[]")}catch{return[]}},
  saveClip(t){const c=CH.clips();c.unshift({text:t,ts:new Date().toISOString()});localStorage.setItem(CH.clipKey,JSON.stringify(c.slice(0,80)))},
  boundaryModule(){const t=CH.messages.map(m=>m.content).join("\n");const ms=Array.from(t.matchAll(/\[世界树:([^\]]+)\]/g));return ms.length?ms[ms.length-1][1]:t.includes("[/世界树]")?"":""},
  baseUrl(){return CH.loadS().baseUrl.replace(/\/+$/,"")},
  headers(){const s=CH.loadS();const h={"Content-Type":"application/json"};if(s.token)h.Authorization="Bearer "+s.token;return h},
  httpError(prefix,r,text){const body=U.compact(text||"",180);if(r.status===401||r.status===403)return `${prefix} HTTP ${r.status}: 鉴权失败，请检查 API Token / API_SERVER_KEY${body?`（${body}）`:""}`;return `${prefix} HTTP ${r.status}${body?`: ${body}`:""}`},
  async checkBase(baseUrl){
    const base=String(baseUrl||"").replace(/\/+$/,"");if(!base)throw new Error("网关地址为空");
    let r;
    try{r=await fetch(base+"/health",{headers:CH.headers()})}catch(e){throw new Error(`${base} 无法连接: ${e.message||e}`)}
    const txt=await r.text().catch(()=>"");
    if(!r.ok)throw new Error(CH.httpError("健康检查失败",r,txt));
    let data={};try{data=txt?JSON.parse(txt):{}}catch{data={raw:txt}}
    return{baseUrl:base,data};
  },
  async autoConnect(){
    const s=CH.loadS();const urls=[s.baseUrl,...CFG.gatewayCandidates].map(u=>String(u||"").replace(/\/+$/,"")).filter(Boolean);
    const candidates=[...new Set(urls)];const errors=[];
    for(const base of candidates){
      try{const ok=await CH.checkBase(base);CH.saveS({...s,baseUrl:ok.baseUrl});CH.status="已连接";return ok}
      catch(e){errors.push(e.message)}
    }
    throw new Error(errors.join("；")||"没有可用网关");
  },
  async health(){return (await CH.checkBase(CH.baseUrl())).data},
  async send(msg,m,onDelta){let msgs=CH.loadS();const sid=msgs.sessionId||msgs.sessionsByModule?.[CH.moduleKey(m)];if(!sid)throw new Error("请先创建会话");const r=await fetch(CH.baseUrl()+"/api/sessions/"+encodeURIComponent(sid)+"/chat",{method:"POST",headers:CH.headers(),body:JSON.stringify({message:msg})});const txt=await r.text().catch(()=>"");if(!r.ok)throw new Error(CH.httpError("发送失败",r,txt));let d={};try{d=txt?JSON.parse(txt):{}}catch{d={content:txt}}const final=d?.message?.content||d?.content||"";onDelta("",final);return final},
  async createSession(m){const mn=m?.worlds?.[0]?.title||"world-tree";const r=await fetch(CH.baseUrl()+"/api/sessions",{method:"POST",headers:CH.headers(),body:JSON.stringify({title:"观测终端 · "+mn+" · "+new Date().toISOString().replace(/\.\d{3}Z$/,"").replace("T"," ")})});const txt=await r.text().catch(()=>"");if(!r.ok)throw new Error(CH.httpError("创建会话失败",r,txt));let d={};try{d=txt?JSON.parse(txt):{}}catch{d={}}const sid=d?.session?.id||d?.id;if(!sid)throw new Error("API 未返回 session id");const s=CH.loadS();s.sessionsByModule=CH.loadS().sessionsByModule||{};s.sessionsByModule[CH.moduleKey(m)]=sid;CH.saveS(s);CH.upsertMeta(m,{id:sid,title:mn,createdAt:new Date().toISOString()});return sid},
  upsertMeta(m,meta){if(!meta?.id)return;const s=CH.loadS();const k=CH.moduleKey(m);const bucket=[...CH.sessionsMetaFor(m)];const idx=bucket.findIndex(i=>i.id===meta.id);if(idx>=0)bucket[idx]={...bucket[idx],...meta};else bucket.unshift(meta);const smbm={...(s.sessionsMetaByModule||{}),[k]:bucket.slice(0,12)};CH.saveS({...s,sessionsMetaByModule:smbm})}
};

/* ── 应用控制器 ── */
function cls(){CH.apiProcessed=false}
function renderTabs(active){return CFG.tabs.map(t=>`<button class="tab ${active===t.id?"active":""}" data-tab="${U.esc(t.id)}">${U.esc(t.label)}</button>`).join("")}
async function render(){
  const m=AS.model||{loaded:false,modules:[],activeModule:null,warnings:[],sourceLabel:AS.sourceLabel};
  const tab=AS.activeTab;
  U.qs("#tabs").innerHTML=renderTabs(tab);
  const ctx=m?.worlds?.[0]?m.worlds[0].title:AS.sourceLabel;
  U.qs("#contextLine").textContent=m.loaded?`${ctx} · ${AS.files.size} 个文件`:"← 拖拽或选择目录";
  U.qs("#statusRight").textContent=m.loaded?`${m.worlds?.length||0} 世界 · v${m.pkg?.version||"-"}`:"待加载";
  const view=Views.get(tab);
  U.qs("#main").innerHTML=view.render(m);
  U.qs("#refreshBtn").disabled=!m.loaded;
  bindEvents(m);
}
function bindEvents(m){
  for(const btn of U.qsa("#pickDirBtn,[data-pick-dir]"))btn.onclick=()=>{U.qs("#dirInput")?.click()};
  // Tab clicks
  for(const btn of U.qsa("[data-tab]"))btn.onclick=()=>{AS.activeTab=btn.dataset.tab;render()};
  // Module select
  for(const btn of U.qsa("[data-select-module]"))btn.onclick=()=>{AS.activeModule=btn.dataset.selectModule;createToast("已切换到: "+btn.dataset.selectModule);render()};
  // Chat events
  if(AS.activeTab==="chat")bindChat(m);
}
function bindChat(m){
  const sendBtn=U.qs("[data-chat-send]");const input=U.qs("#chatInput");
  if(sendBtn)sendBtn.onclick=async()=>{
    if(CH.busy||!input?.value?.trim())return;CH.busy=true;sendBtn.disabled=true;
    const txt=input.value.trim();input.value="";CH.draft="";
    CH.add("user",txt);const msgs=U.qs("#chatMessages");if(msgs)msgs.innerHTML=CH.messages.map(C.chatMsg).join("");msgs?.scrollTo(0,msgs.scrollHeight);
    try{
      await CH.send(txt,m,(_,final)=>{CH.add("assistant",final);if(msgs)msgs.innerHTML=CH.messages.map(C.chatMsg).join("");msgs?.scrollTo(0,msgs.scrollHeight);});
    }catch(e){CH.add("error",String(e));if(msgs)msgs.innerHTML=CH.messages.map(C.chatMsg).join("")}
    finally{CH.busy=false;sendBtn.disabled=false}
  };
  if(input)input.onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendBtn?.click()};CH.draft=input.value};
  const newBtn=U.qs("[data-chat-new]");
  if(newBtn)newBtn.onclick=async()=>{
    try{const sid=await CH.createSession(m);createToast("新会话: "+sid);U.qs("#chatSid").value=sid;render()}catch(e){createToast("创建失败: "+e.message,"bad")}
  };
  const saveBtn=U.qs("[data-chat-save]");
  if(saveBtn)saveBtn.onclick=()=>{
    const s=CH.loadS();s.baseUrl=U.qs("#chatUrl")?.value||s.baseUrl;s.token=U.qs("#chatToken")?.value||s.token;s.sessionId=U.qs("#chatSid")?.value||s.sessionId;
    CH.saveS(s);createToast("设置已保存");CH.apiProcessed=false;
  };
  const healthBtn=U.qs("[data-chat-health]");
  if(healthBtn)healthBtn.onclick=async()=>{try{const h=await CH.health();createToast("已连接: "+JSON.stringify(h).slice(0,80));CH.status="已连接";render()}catch(e){createToast("连接失败: "+e.message,"bad");CH.status="未连接";render()}};
  const clearBtn=U.qs("[data-chat-clear]");
  if(clearBtn)clearBtn.onclick=()=>{if(confirm("清空当前对话？")){CH.clear();render()}};
  const autoBtn=U.qs("[data-chat-auto]");
  if(autoBtn)autoBtn.onclick=async()=>{
    try{const h=await CH.autoConnect();CH.status="已连接";createToast("自动连接成功: "+h.baseUrl);render()}catch(e){CH.status="连接失败";createToast("自动连接失败: "+e.message,"bad");render()}
  };
  // Clip button delegation
  const main=U.qs("#main");
  if(main)main.onclick=e=>{
    const btn=e.target.closest("[data-chat-clip]");if(!btn)return;
    const mid=btn.dataset.chatClip;const msg=CH.messages.find(m=>m.id===mid);
    if(msg){CH.saveClip(msg.content);createToast("片段已保存")}
  };
  // Chat switch
  for(const btn of U.qsa("[data-chat-switch]"))btn.onclick=()=>{const s=CH.loadS();s.sessionId=btn.dataset.chatSwitch;CH.saveS(s);createToast("已切换会话");render()};
}

/* ── Toast ── */
let toastTimer;
function createToast(msg,tone=""){
  const t=document.createElement("div");t.style.cssText=`position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:999;padding:10px 20px;border-radius:8px;border:1px solid ${tone==="bad"?"rgba(229,77,77,.5)":"rgba(62,207,142,.4)"};background:${tone==="bad"?"#1f1212":"#0f1f18"};color:${tone==="bad"?"#ffadad":"#b8f0d0"};font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.5);max-width:80vw;text-align:center`;t.textContent=msg;document.body.appendChild(t);
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.remove(),3500);
}

/* ── 文件加载 ── */
async function loadFromPicked(files){
  const m=await DS.loadFromDir(files,"已选择目录");
  AS.model=m;AS.activeTab="overview";render();
  createToast(`加载完毕 · ${AS.files.size} 文件 · ${m.worlds?.length||0} 世界`);
}

// Drag and drop
document.addEventListener("dragover",e=>{e.preventDefault()});
document.addEventListener("drop",async e=>{
  e.preventDefault();
  const items=e.dataTransfer?.items;if(!items?.length)return;
  const entries=[];let hasDj=false;
  for(const item of Array.from(items)){
    const entry=item.webkitGetAsEntry?.()||item.getAsEntry?.();
    if(entry){entries.push(entry);if(item.kind==="file"&&U.ext(item.name||"").toLowerCase()==="json")hasDj=true}
  }
  if(!entries.length)return;
  const records=new Map();
  async function walk(entry,prefix){
    const p=U.path(prefix,entry.name);
    if(entry.isFile){await new Promise((rs,rj)=>entry.file(f=>{records.set(U.norm(p),{path:p,file:f,lastModified:f.lastModified});rs()},rj));return}
    records.set(U.norm(p),{path:p,kind:"directory"});
    const reader=entry.createReader();
    while(true){const batch=await new Promise(rs=>reader.readEntries(rs));if(!batch.length)break;for(const c of batch)await walk(c,p)}
  }
  for(const e of entries){if(e.isDirectory)await walk(e,"");else if(e.isFile)await walk(e,"")}
  // Strip wrapping root if single
  const firstSegs=new Set();for(const k of records.keys()){const first=k.split("/")[0];if(first)firstSegs.add(first)}
  if(firstSegs.size===1&&records.has(Array.from(firstSegs)[0]+"/package.json")){
    const rewritten=new Map();
    for(const rec of records.values()){
      const p=String(rec.path||"");const n=U.norm(p);
      const first=n.split("/")[0];
      if(n===first)continue;
      const stripped=p.split(/[\\/]/).slice(1).join("/");if(!stripped)continue;
      rewritten.set(U.norm(stripped),{...rec,path:stripped});
    }
    records.clear();for(const[k,v]of rewritten)records.set(k,v);
  }
  AS.files=records;AS.jsonCache=new Map();AS.warnings=[];AS.sourceLabel="拖拽项目";
  const m=await DS.buildModel();AS.model=m;AS.activeTab="overview";render();
  createToast(`加载完毕 · ${AS.files.size} 文件 · ${m.worlds?.length||0} 世界`);
});

// Pick directory button
U.qs("#pickDirBtn")?.addEventListener("click",()=>{U.qs("#dirInput")?.click()});
U.qs("#dirInput")?.addEventListener("change",async e=>{
  const files=e.target.files;if(!files?.length)return;await loadFromPicked(files);
});
// Refresh
U.qs("#refreshBtn")?.addEventListener("click",async()=>{if(AS.files.size){AS.jsonCache=new Map();AS.warnings=[];const m=await DS.buildModel();AS.model=m;render();createToast("已刷新")}});
// Drag button hint
U.qs("#dragBtn")?.addEventListener("click",()=>{createToast("📎 将项目文件夹拖拽到页面上任意位置即可加载")});

/* ── Init ── */
async function init(){
  render();
  // Auto-load if Electron (try to read project files)
  if(U.isElectron()&&window.worldTreeDesktop){
    try{
      const info=await window.worldTreeDesktop.appInfo?.();
      const paths=info?.paths||{};
      const records=[];
      if(paths.defaultContentRoot){
        const content=await window.worldTreeDesktop.readRoot(paths.defaultContentRoot);
        records.push(...(content?.records||[]));
      }
      if(paths.dataRoot){
        const data=await window.worldTreeDesktop.readRoot(paths.dataRoot);
        records.push(...(data?.records||[]).map(r=>({...r,path:U.path("data",r.path)})));
      }
      if(records.length){
        const m=await DS.loadFromRecords(records,paths.portableRoot||paths.defaultContentRoot||"Electron IPC");
        AS.model=m;AS.activeTab="overview";await render();
        createToast(`Electron 自动加载完成 · ${AS.files.size} 文件 · ${m.worlds?.length||0} 世界`);
      }
      if(CH.loadS().autoConnect){
        CH.autoConnect().then(()=>{CH.status="已连接";render()}).catch(()=>{CH.status="未连接"});
      }
    }catch(e){createToast("Electron IPC 错误: "+e.message,"bad")}
  }
}
init();
</script>
